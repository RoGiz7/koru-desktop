name: Release

# Se dispara al subir una etiqueta de versión, p. ej. v0.1.0.
# También se puede lanzar a mano (workflow_dispatch) indicando el tag a publicar:
# útil como red de seguridad si el push del tag no disparó el Action.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag a publicar (p. ej. v0.1.5). Debe existir ya."
        required: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          # En push de tag, github.ref ya es el tag. En manual, usa el input.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Node
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Compilar, firmar y publicar Release (con latest.json para el updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: "Koru Desktop ${{ github.event.inputs.tag || github.ref_name }}"
          releaseBody: "Instalador abajo. Si ya tienes la app, se actualizará sola."
          releaseDraft: true
          prerelease: false
