name: Release

# Se dispara al subir una etiqueta de versión, p. ej. v0.1.0
on:
  push:
    tags:
      - "v*"

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Instalar dependencias del frontend
        run: npm ci

      - name: Compilar, firmar y publicar Release (con latest.json para el updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Koru Desktop ${{ github.ref_name }}"
          releaseBody: "Instalador abajo. Si ya tienes la app, se actualizará sola."
          releaseDraft: true
          prerelease: false
